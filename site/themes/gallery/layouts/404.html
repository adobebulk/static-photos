<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>{{ partial "head.html" . }}</head>
<body class="min-h-screen flex flex-col bg-stone-50 text-stone-900 font-sans">
  {{ partial "header.html" . }}
  <main class="flex-1 flex items-center justify-center">
    <div class="text-center">
      <p class="text-7xl font-bold tracking-tight text-stone-200">404</p>
      <p class="mt-4 text-sm text-stone-500">Page not found.</p>
      <a href="{{ "/" | relURL }}" class="mt-6 inline-block text-sm text-stone-400 hover:text-stone-900 transition-colors">← Go home</a>
    </div>
  </main>
</body>
</html>
