baseURL = "http://localhost:1313/"
languageCode = "en-us"
title = "Photos"
theme = "gallery"

[params]
  photographer = "Your Name"
  description   = "A photo gallery"
  # Number of columns in the project grid on the homepage (desktop)
  gridColumns   = 3

[build]
  writeStats = true

[imaging]
  # Quality for Hugo-processed thumbnails
  quality = 85
  resampleFilter = "Lanczos"
